# Cloudflare deployment for the Myra hub (phase P4).
# Deploy is NOT run by CI/the repo — it needs `wrangler login` + an account:
#   cd packages/hub
#   wrangler kv namespace create PAIRING        # paste the id below
#   wrangler secret put MYRA_HUB_SECRET         # a long random string
#   wrangler deploy
# Flip dev login on only for testing: `wrangler deploy --var MYRA_HUB_DEV_LOGIN:1`.

name = "myra-hub"
main = "src/cf/worker.ts"
compatibility_date = "2024-09-23"

[[durable_objects.bindings]]
name = "USER_HUB"
class_name = "UserHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserHub"]

# Create the namespace, then replace the placeholder id:
[[kv_namespaces]]
binding = "PAIRING"
id = "8be5ab52e37742e2ab15ab6d395b81d4"
