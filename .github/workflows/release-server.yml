name: release-server

# Build the self-contained myra-server binary for every supported OS/arch and
# attach the assets (+ .sha256) to the GitHub Release for the pushed v* tag.
# Install scripts pull from releases/latest/download/.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: myra-server-x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            asset: myra-server-aarch64-unknown-linux-gnu
          - runner: macos-13
            asset: myra-server-x86_64-apple-darwin
          - runner: macos-14
            asset: myra-server-aarch64-apple-darwin
          - runner: windows-latest
            asset: myra-server-x86_64-pc-windows-msvc.exe
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile binary
        run: bun build --compile packages/server/src/index.ts --outfile "${{ matrix.asset }}"

      - name: Checksum (unix)
        if: runner.os != 'Windows'
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi

      - name: Checksum (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $h = (Get-FileHash "${{ matrix.asset }}" -Algorithm SHA256).Hash.ToLower()
          "$h  ${{ matrix.asset }}" | Out-File -Encoding ascii "${{ matrix.asset }}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
