name: Release

# Build the Tauri desktop app for every platform and publish a GitHub Release
# when a v* tag is pushed (e.g. v0.1.0). Each runner builds NATIVELY for its own
# arch so the host triple matches the bundled `myra-server` sidecar that
# `scripts/build-sidecar.mjs` downloads (no cross-compiling the sidecar).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-26 (Tahoe image, SDK 26.x) — the linked SDK decides how macOS
          # renders the app: binaries linked against an older SDK get the legacy
          # "compatibility" appearance on macOS 26 (smaller traffic lights, old
          # materials), visibly different from local dev builds. Keep this image
          # (and the self-hosted x64 Mac) on the same SDK major as dev machines.
          - platform: macos-26 # Apple Silicon
            target: aarch64-apple-darwin
          # GitHub retired its Intel macOS hosted runner; x86_64 is built on our
          # self-hosted Apple Silicon Mac (label `myra-x64`, see runner.sh in the
          # dev workspace). Tauri cross-compiles the Rust shell to x86_64, and the
          # bundled sidecar is forced to this target via MYRA_SERVER_TRIPLE below
          # (otherwise build-sidecar.mjs would fetch the host's arm64 binary).
          - platform: myra-x64 # self-hosted Apple Silicon, cross-builds x86_64
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          submodules: recursive

      # Guard: the macOS SDK we link against must match what dev machines use,
      # or the released app renders with the legacy compatibility appearance on
      # current macOS (e.g. smaller traffic lights). Fail fast on image drift.
      - name: Assert macOS SDK >= 26
        if: runner.os == 'macOS'
        run: |
          SDK="$(xcrun --show-sdk-version)"
          echo "macOS SDK: $SDK"
          [ "${SDK%%.*}" -ge 26 ] || { echo "::error::SDK $SDK too old — bump the runner image/Xcode (need 26+)"; exit 1; }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo / Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}
          # `myra-x64` is a self-hosted (persistent) Mac, not an ephemeral VM.
          # rust-cache's default `cache-bin: true` cleans `~/.cargo/bin` on save,
          # which deletes the developer's real `rustup` binary and breaks local
          # cargo after every release. Keep it off so CI never touches the host's
          # toolchain proxies.
          cache-bin: false

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            patchelf \
            build-essential

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # Import the Developer ID cert into a dedicated keychain ourselves (instead
      # of letting tauri-action do it). On the self-hosted `myra-x64` Mac the
      # runner is a headless launchd service: tauri-action's keychain import +
      # codesign fail with `errSecInternalComponent` because the key isn't
      # reachable without `set-key-partition-list`. Doing it explicitly — unlock
      # + partition-list granting `codesign`/`apple-tool` access — makes codesign
      # work headlessly. tauri-cli then signs with APPLE_SIGNING_IDENTITY using
      # this keychain (no APPLE_CERTIFICATE passed, so it doesn't re-import).
      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "No APPLE_CERTIFICATE secret — building unsigned."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -d -A > "$CERT_PATH"
          # Fresh keychain so we never touch the login keychain on the self-hosted Mac.
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          # Grant codesign/apple-tool access to the imported key without a UI prompt
          # — the fix for errSecInternalComponent in a headless session.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH" >/dev/null
          # Put our keychain first in the user search list, keeping the existing ones.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$CERT_PATH"
          echo "Imported signing identity into $KEYCHAIN_PATH"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PostHog analytics baked into the static export at build time. The
          # project token is public/write-only, so a plain repo Variable (not a
          # Secret) is fine — set it once in Settings → Secrets and variables →
          # Actions → Variables. Absent → the app ships with analytics disabled.
          NEXT_PUBLIC_POSTHOG_KEY: ${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
          # build-sidecar.mjs reads server-version.json; override here if needed.
          # Pin the bundled sidecar to the BUILD target, not the runner host —
          # required when cross-compiling x86_64 on the Apple Silicon self-hosted
          # runner (otherwise it would download the arm64 sidecar). Harmless on
          # native rows where the target already equals the host triple.
          MYRA_SERVER_TRIPLE: ${{ matrix.target }}
          #
          # Updater signing. tauri-action signs the update artifacts with this
          # minisign key and auto-generates + uploads `latest.json` to the release
          # (its includeUpdaterJson default), which the app's updater plugin polls
          # at releases/latest/download/latest.json. The matching PUBLIC key is
          # committed in tauri.conf.json (plugins.updater.pubkey). Keep them in
          # sync — a mismatch fails signature verification on every update. Empty
          # (forks without the secret) → no updater artifacts, install still works.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          #
          # macOS code signing + notarization. The certificate is imported into a
          # dedicated keychain by the "Import Apple signing certificate" step above
          # (works headless on the self-hosted runner via set-key-partition-list);
          # we deliberately do NOT pass APPLE_CERTIFICATE here so tauri-cli signs
          # with the already-imported identity instead of re-importing. These are
          # no-ops on Linux/Windows. Empty (forks without secrets) → unsigned.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Myra Agents __VERSION__"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  # Only after ALL platform builds succeed (so every binary is attached) publish
  # the draft the matrix created: mark it latest and replace tauri-action's stub
  # body with this version's CHANGELOG section. Keeps the draft as the mid-build
  # safety gate while removing the manual publish + notes step for every release.
  finalize:
    needs: build
    runs-on: ubuntu-latest
    # contents: publish the draft release. actions: dispatch the smoke workflow
    # below (needs actions:write).
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout (at the released tag)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Publish release with CHANGELOG notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          NOTES_FILE="$RUNNER_TEMP/notes.md"
          # Extract the `## [VERSION]` block from CHANGELOG (drop the header line
          # itself and the trailing `---` separator).
          awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { f=1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md | sed '/^---$/d' > "$NOTES_FILE" || true
          if [ -s "$NOTES_FILE" ]; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --draft=false --latest --notes-file "$NOTES_FILE"
          else
            echo "No CHANGELOG section for $VERSION — publishing with existing notes."
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
          fi

      # Kick the post-release smoke test explicitly. We publish the draft above
      # with GITHUB_TOKEN, and GitHub suppresses the `release: published` event
      # for token-driven publishes (anti-recursion) — so smoke-installed-app.yml
      # would silently never fire on real releases. `workflow_dispatch` is an
      # explicit exception to that suppression, so dispatching it here works and
      # runs the install-and-launch smoke on the Win/Linux/macOS self-hosted VMs.
      - name: Trigger installed-app smoke test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh workflow run smoke-installed-app.yml \
            --repo "$GITHUB_REPOSITORY" -f version="$TAG"
