name: Release

# Build the Tauri desktop app for every platform and publish a GitHub Release
# when a v* tag is pushed (e.g. v0.1.0). Each runner builds NATIVELY for its own
# arch so the host triple matches the bundled `myra-server` sidecar that
# `scripts/build-sidecar.mjs` downloads (no cross-compiling the sidecar).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # Apple Silicon
            target: aarch64-apple-darwin
          # GitHub retired its Intel macOS hosted runner; x86_64 is built on our
          # self-hosted Apple Silicon Mac (label `myra-x64`, see runner.sh in the
          # dev workspace). Tauri cross-compiles the Rust shell to x86_64, and the
          # bundled sidecar is forced to this target via MYRA_SERVER_TRIPLE below
          # (otherwise build-sidecar.mjs would fetch the host's arm64 binary).
          - platform: myra-x64 # self-hosted Apple Silicon, cross-builds x86_64
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo / Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            patchelf \
            build-essential

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PostHog analytics baked into the static export at build time. The
          # project token is public/write-only, so a plain repo Variable (not a
          # Secret) is fine — set it once in Settings → Secrets and variables →
          # Actions → Variables. Absent → the app ships with analytics disabled.
          NEXT_PUBLIC_POSTHOG_KEY: ${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
          # build-sidecar.mjs reads server-version.json; override here if needed.
          # Pin the bundled sidecar to the BUILD target, not the runner host —
          # required when cross-compiling x86_64 on the Apple Silicon self-hosted
          # runner (otherwise it would download the arm64 sidecar). Harmless on
          # native rows where the target already equals the host triple.
          MYRA_SERVER_TRIPLE: ${{ matrix.target }}
          #
          # macOS code signing + notarization (no-ops on Linux/Windows and on
          # forks where the secrets are absent — the build just stays unsigned).
          # tauri-action imports APPLE_CERTIFICATE into a temp keychain, signs
          # with APPLE_SIGNING_IDENTITY, then notarizes + staples via the Apple
          # ID + app-specific password. See SIGNING.md for how to mint these.
          # Sign + notarize ONLY on the hosted arm64 mac (macos-14). The
          # x86_64 row runs on the self-hosted `myra-x64` Mac as a headless
          # launchd service with no GUI keychain session, where `codesign`
          # fails with `errSecInternalComponent`. Gate the Apple secrets to the
          # arm64 target so the x86_64 build ships UNSIGNED instead of failing.
          APPLE_CERTIFICATE: ${{ matrix.target == 'aarch64-apple-darwin' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.target == 'aarch64-apple-darwin' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.target == 'aarch64-apple-darwin' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ matrix.target == 'aarch64-apple-darwin' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.target == 'aarch64-apple-darwin' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.target == 'aarch64-apple-darwin' && secrets.APPLE_TEAM_ID || '' }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Myra Agents __VERSION__"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
